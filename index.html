<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Bonecos</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f0f0f0;
}

.container {
  margin-top: 40px;
}

#boneco {
  margin: 20px auto;
  width: 200px;
  height: 300px;
  position: relative;
}

.parte {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* PARTES */
.cabeca {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  top: 0;
}

.olhos {
  width: 60px;
  height: 10px;
  top: 50px;
  display: flex;
  justify-content: space-between;
}

.olhos div {
  width: 15px;
  height: 15px;
  border-radius: 50%;
}

.cabelo {
  width: 130px;
  height: 60px;
  top: -10px;
  border-radius: 60px 60px 0 0;
}

.corpo {
  width: 120px;
  height: 140px;
  top: 120px;
  border-radius: 20px;
}

/* CONTROLES */
.controls {
  margin-top: 20px;
}

select, input {
  margin: 5px;
  padding: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Criar Boneco</h1>

<input id="nome" placeholder="Digite seu nome">
<button onclick="gerar()">Criar</button>

<div id="boneco">
  <div class="parte cabelo" id="cabelo"></div>
  <div class="parte cabeca" id="cabeca"></div>
  
  <div class="parte olhos">
    <div id="olho1"></div>
    <div id="olho2"></div>
  </div>

  <div class="parte corpo" id="corpo"></div>
</div>

<div class="controls">
  <h3>Personalizar</h3>

  Pele:
  <input type="color" onchange="mudar('cabeca', this.value)">

  Roupa:
  <input type="color" onchange="mudar('corpo', this.value)">

  Olhos:
  <input type="color" onchange="mudarOlho(this.value)">

  Cabelo:
  <input type="color" onchange="mudar('cabelo', this.value)">
</div>

</div>

<script>
// transforma nome em número
function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = str.charCodeAt(i) + ((h << 5) - h);
  }
  return Math.abs(h);
}

// gera cor a partir de número
function cor(seed, offset) {
  let r = (seed + offset) % 255;
  let g = (seed * 2 + offset) % 255;
  let b = (seed * 3 + offset) % 255;
  return `rgb(${r},${g},${b})`;
}

// gerar boneco
function gerar() {
  let nome = document.getElementById("nome").value;
  if (!nome) return;

  let seed = hash(nome);

  document.getElementById("cabeca").style.background = cor(seed, 10);
  document.getElementById("corpo").style.background = cor(seed, 50);
  document.getElementById("cabelo").style.background = cor(seed, 100);

  let olhoCor = cor(seed, 150);
  document.getElementById("olho1").style.background = olhoCor;
  document.getElementById("olho2").style.background = olhoCor;
}

// personalização
function mudar(id, cor) {
  document.getElementById(id).style.background = cor;
}

function mudarOlho(cor) {
  document.getElementById("olho1").style.background = cor;
  document.getElementById("olho2").style.background = cor;
}
</script>

</body>
</html>
